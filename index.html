<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mochila Escolar Cloud</title>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>

body{
margin:0;
font-family:Segoe UI;
background:#f1fff6;
}

/* LOGIN */

#login{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:white;
padding:30px;
border-radius:12px;
width:300px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

input{
width:100%;
padding:10px;
margin:5px 0;
border-radius:8px;
border:1px solid #ccc;
}

button{
width:100%;
padding:10px;
margin-top:10px;
background:#95d5b2;
border:none;
border-radius:8px;
cursor:pointer;
}

/* APP */

header{
background:#b7e4c7;
padding:15px;
text-align:center;
font-weight:bold;
}

nav{
display:flex;
gap:10px;
justify-content:center;
background:#d8f3dc;
padding:10px;
}

.container{
padding:20px;
max-width:1000px;
margin:auto;
}

.card{
background:white;
padding:15px;
border-radius:12px;
margin-bottom:10px;
}

.categoria{
background:#95d5b2;
padding:10px;
border-radius:8px;
cursor:pointer;
margin-top:10px;
}

.hidden{display:none;}

table{
width:100%;
border-collapse:collapse;
}

td,th{
border:1px solid #ccc;
padding:8px;
text-align:center;
}

</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
<div class="box">
<h2>Login</h2>
<input id="email" placeholder="Email">
<input id="senha" type="password" placeholder="Senha">

<button onclick="registrar()">Criar Conta</button>
<button onclick="login()">Entrar</button>
</div>
</div>

<!-- APP -->
<div id="app" style="display:none">

<header>🎒 Mochila Escolar Cloud</header>

<nav>
<button onclick="abrir('materias')">Matérias</button>
<button onclick="abrir('horario')">Horário</button>
<button onclick="logout()">Sair</button>
</nav>

<div class="container">

<div id="materias">

<div class="card">
<input id="nomeMateria" placeholder="Nova matéria">
<select id="tipoMateria">
<option>Exatas</option>
<option>Humanas</option>
<option>Informática</option>
</select>
<button onclick="addMateria()">Adicionar</button>
</div>

<div id="listaMaterias"></div>

</div>

<div id="horario" class="hidden">

<div class="card">
<h3>Matutino (5 aulas)</h3>
<table id="matutino"></table>

<h3>Vespertino (4 aulas)</h3>
<table id="vespertino"></table>

<button onclick="salvarHorario()">Salvar</button>
</div>

</div>

</div>
</div>

<script>

// 🔥 CONFIG FIREBASE
const firebaseConfig = {
  apiKey: "SUA_CHAVE",
  authDomain: "SEU_DOMINIO",
  projectId: "SEU_ID",
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let materias = [];

// 🔐 LOGIN

function registrar(){
auth.createUserWithEmailAndPassword(
email.value, senha.value
).then(()=>alert("Conta criada"))
.catch(e=>alert(e.message));
}

function login(){
auth.signInWithEmailAndPassword(
email.value, senha.value
).then(()=>{
login.style.display="none";
app.style.display="block";
carregar();
}).catch(e=>alert(e.message));
}

function logout(){
auth.signOut();
location.reload();
}

// 📦 MATERIAS

function addMateria(){
materias.push({
nome:nomeMateria.value,
tipo:tipoMateria.value
});
salvarMaterias();
renderMaterias();
}

function salvarMaterias(){
const user = auth.currentUser;

db.collection("materias")
.doc(user.uid)
.set({lista:materias});
}

function carregar(){
const user = auth.currentUser;

db.collection("materias")
.doc(user.uid)
.get()
.then(doc=>{
if(doc.exists){
materias = doc.data().lista;
renderMaterias();
}
});

gerarTabela("matutino",5);
gerarTabela("vespertino",4);
carregarHorario();
}

function renderMaterias(){
listaMaterias.innerHTML="";

["Exatas","Humanas","Informática"].forEach(tipo=>{

const grupo=materias.filter(m=>m.tipo===tipo);

if(grupo.length===0)return;

listaMaterias.innerHTML+=`
<div class="categoria">${tipo}</div>
`;

grupo.forEach(m=>{
listaMaterias.innerHTML+=`
<div class="card">${m.nome}</div>
`;
});

});
}

// 📅 HORARIO

function gerarTabela(id,linhas){
const dias=["Seg","Ter","Qua","Qui","Sex"];

let html="<tr><th></th>";
dias.forEach(d=>html+=`<th>${d}</th>`);
html+="</tr>";

for(let i=1;i<=linhas;i++){
html+=`<tr><td>${i}</td>`;
dias.forEach(d=>{
html+=`<td contenteditable="true" id="${id}-${i}-${d}"></td>`;
});
html+="</tr>";
}

document.getElementById(id).innerHTML=html;
}

function salvarHorario(){
const user=auth.currentUser;

let dados={};

document.querySelectorAll("td[contenteditable]").forEach(td=>{
dados[td.id]=td.innerText;
});

db.collection("horario")
.doc(user.uid)
.set(dados);

alert("Salvo!");
}

function carregarHorario(){
const user=auth.currentUser;

db.collection("horario")
.doc(user.uid)
.get()
.then(doc=>{
if(doc.exists){
const dados=doc.data();
for(let k in dados){
const el=document.getElementById(k);
if(el) el.innerText=dados[k];
}
}
});
}

// 🔁 NAVEGAÇÃO

function abrir(p){
materias.style.display="none";
horario.style.display="none";
document.getElementById(p).style.display="block";
}

</script>

</body>
</html>
