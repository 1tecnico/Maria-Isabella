<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mochila Escolar Digital</title>

<style>
:root{
    --rosa-principal:#ffb6c1;
    --rosa-secundario:#ff9eb5;
    --rosa-claro:#fff0f5;
    --fundo:#ffe6f0;
    --texto:#5a2a3a;
}

body{
    margin:0;
    font-family: 'Segoe UI', Arial, sans-serif;
    background:var(--fundo);
}

header{
    background:var(--rosa-principal);
    color:var(--texto);
    padding:20px;
    text-align:center;
    font-size:22px;
    font-weight:bold;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.container{
    max-width:800px;
    margin:auto;
    padding:20px;
}

.card{
    background:white;
    border-radius:16px;
    padding:20px;
    margin-bottom:20px;
    box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

input{
    width:100%;
    padding:10px;
    margin-bottom:10px;
    border-radius:8px;
    border:1px solid var(--rosa-principal);
}

button{
    padding:8px 12px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:600;
}

.btn-add{
    background:var(--rosa-secundario);
    color:var(--texto);
    width:100%;
}

.btn-add:hover{
    background:#ff85a2;
}

.materia{
    border-left:6px solid var(--rosa-secundario);
}

.materia h3{
    margin-top:0;
    color:#c71585;
}

.lista-item{
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:var(--rosa-claro);
    padding:8px 10px;
    border-radius:8px;
    margin-bottom:6px;
}

.lista-item span.concluida{
    text-decoration: line-through;
    opacity:0.6;
}

.acoes button{
    margin-left:5px;
    background:#ff4d6d;
    color:white;
}

.acoes button:hover{
    background:#e63950;
}

.check{
    margin-right:8px;
}

.excluir-materia{
    background:#ff4d6d;
    color:white;
    float:right;
}

footer{
    text-align:center;
    padding:15px;
    background:var(--rosa-principal);
    margin-top:30px;
    color:var(--texto);
}
</style>
</head>

<body>

<header>🎒 Minha Mochila Escolar</header>

<div class="container">

<div class="card">
    <h2>Adicionar Matéria</h2>
    <input type="text" id="nomeMateria" placeholder="Nome da matéria">
    <input type="text" id="novoConteudo" placeholder="Adicionar conteúdo">
    <input type="text" id="novaTarefa" placeholder="Adicionar tarefa">
    <button class="btn-add" onclick="adicionarMateria()">Adicionar</button>
</div>

<div id="listaMaterias"></div>

</div>

<footer>© 2026 Mochila Escolar Digital</footer>

<script>
let materias = JSON.parse(localStorage.getItem("materias")) || [];

function salvar(){
    localStorage.setItem("materias", JSON.stringify(materias));
}

function renderizar(){
    const lista = document.getElementById("listaMaterias");
    lista.innerHTML="";

    materias.forEach((materia, i)=>{

        const div = document.createElement("div");
        div.className="card materia";

        div.innerHTML=`
            <button class="excluir-materia" onclick="excluirMateria(${i})">Excluir Matéria</button>
            <h3>${materia.nome}</h3>

            <strong>Conteúdos</strong>
            <div id="conteudos-${i}"></div>
            <input type="text" placeholder="Novo conteúdo" onkeydown="if(event.key==='Enter') addConteudo(${i}, this.value)">

            <br><br>
            <strong>Tarefas</strong>
            <div id="tarefas-${i}"></div>
            <input type="text" placeholder="Nova tarefa" onkeydown="if(event.key==='Enter') addTarefa(${i}, this.value)">
        `;

        lista.appendChild(div);

        const conteudosDiv = document.getElementById(`conteudos-${i}`);
        materia.conteudos.forEach((c, index)=>{
            conteudosDiv.innerHTML += `
                <div class="lista-item">
                    <span>${c}</span>
                    <div class="acoes">
                        <button onclick="removerConteudo(${i},${index})">X</button>
                    </div>
                </div>`;
        });

        const tarefasDiv = document.getElementById(`tarefas-${i}`);
        materia.tarefas.forEach((t, index)=>{
            tarefasDiv.innerHTML += `
                <div class="lista-item">
                    <div>
                        <input type="checkbox" class="check" 
                        ${t.concluida ? "checked" : ""} 
                        onchange="toggleTarefa(${i},${index})">
                        <span class="${t.concluida ? "concluida" : ""}">
                        ${t.texto}
                        </span>
                    </div>
                    <div class="acoes">
                        <button onclick="removerTarefa(${i},${index})">X</button>
                    </div>
                </div>`;
        });

    });
}

function adicionarMateria(){
    const nome = document.getElementById("nomeMateria").value.trim();
    const conteudo = document.getElementById("novoConteudo").value.trim();
    const tarefa = document.getElementById("novaTarefa").value.trim();

    if(!nome) return alert("Digite o nome da matéria.");

    materias.push({
        nome:nome,
        conteudos: conteudo ? [conteudo] : [],
        tarefas: tarefa ? [{texto:tarefa, concluida:false}] : []
    });

    salvar();
    renderizar();

    document.getElementById("nomeMateria").value="";
    document.getElementById("novoConteudo").value="";
    document.getElementById("novaTarefa").value="";
}

function excluirMateria(i){
    materias.splice(i,1);
    salvar();
    renderizar();
}

function addConteudo(i, valor){
    if(!valor) return;
    materias[i].conteudos.push(valor);
    salvar();
    renderizar();
}

function removerConteudo(i,index){
    materias[i].conteudos.splice(index,1);
    salvar();
    renderizar();
}

function addTarefa(i, valor){
    if(!valor) return;
    materias[i].tarefas.push({texto:valor, concluida:false});
    salvar();
    renderizar();
}

function removerTarefa(i,index){
    materias[i].tarefas.splice(index,1);
    salvar();
    renderizar();
}

function toggleTarefa(i,index){
    materias[i].tarefas[index].concluida = !materias[i].tarefas[index].concluida;
    salvar();
    renderizar();
}

renderizar();
</script>

</body>
</html>
