<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mochila Escolar Digital</title>

<style>
    body {
        font-family: Arial, sans-serif;
        margin: 0;
        background-color: #ffe6f0;
    }

    header {
        background-color: #ffb6c1;
        color: #5a2a3a;
        text-align: center;
        padding: 20px;
    }

    .container {
        padding: 20px;
        max-width: 900px;
        margin: auto;
    }

    .form-materia {
        background-color: #fff0f5;
        padding: 15px;
        border-radius: 10px;
        margin-bottom: 20px;
        box-shadow: 0 0 10px rgba(0,0,0,0.05);
    }

    input, textarea {
        width: 100%;
        padding: 8px;
        margin-top: 5px;
        margin-bottom: 10px;
        border-radius: 5px;
        border: 1px solid #ffb6c1;
    }

    button {
        background-color: #ff9eb5;
        border: none;
        padding: 10px 15px;
        border-radius: 5px;
        cursor: pointer;
        font-weight: bold;
        color: #5a2a3a;
        margin-right: 5px;
    }

    button:hover {
        background-color: #ff85a2;
    }

    .materia {
        background-color: white;
        padding: 15px;
        border-radius: 10px;
        margin-bottom: 15px;
        box-shadow: 0 0 8px rgba(0,0,0,0.08);
        border-left: 6px solid #ff9eb5;
        position: relative;
    }

    .materia h3 {
        margin-top: 0;
        color: #c71585;
    }

    .excluir {
        background-color: #ff4d6d;
        color: white;
        position: absolute;
        top: 10px;
        right: 10px;
    }

    .excluir:hover {
        background-color: #e63950;
    }

    footer {
        text-align: center;
        padding: 15px;
        background-color: #ffb6c1;
        margin-top: 20px;
        color: #5a2a3a;
    }
</style>
</head>

<body>

<header>
    <h1>Minha Mochila Escolar</h1>
    <p>Organize todas as suas matérias</p>
</header>

<div class="container">

    <div class="form-materia">
        <h2>Adicionar Nova Matéria</h2>

        <label>Nome da Matéria:</label>
        <input type="text" id="nomeMateria">

        <label>Conteúdos (separe por vírgula):</label>
        <textarea id="conteudos"></textarea>

        <label>Tarefas (separe por vírgula):</label>
        <textarea id="tarefas"></textarea>

        <button onclick="adicionarMateria()">Adicionar Matéria</button>
    </div>

    <div id="listaMaterias"></div>

</div>

<footer>
    © 2026 - Mochila Escolar Digital
</footer>

<script>
let materias = JSON.parse(localStorage.getItem("materias")) || [];

function salvarDados() {
    localStorage.setItem("materias", JSON.stringify(materias));
}

function renderizarMaterias() {
    const lista = document.getElementById("listaMaterias");
    lista.innerHTML = "";

    materias.forEach((materia, index) => {
        const div = document.createElement("div");
        div.classList.add("materia");

        div.innerHTML = `
            <button class="excluir" onclick="excluirMateria(${index})">Excluir</button>
            <h3>${materia.nome}</h3>
            <strong>Conteúdos:</strong>
            <ul>
                ${materia.conteudos.map(c => `<li>${c}</li>`).join("")}
            </ul>
            <strong>Tarefas:</strong>
            <ul>
                ${materia.tarefas.map(t => `<li>${t}</li>`).join("")}
            </ul>
        `;

        lista.appendChild(div);
    });
}

function adicionarMateria() {
    const nome = document.getElementById("nomeMateria").value.trim();
    const conteudos = document.getElementById("conteudos").value.split(",").map(c => c.trim()).filter(c => c);
    const tarefas = document.getElementById("tarefas").value.split(",").map(t => t.trim()).filter(t => t);

    if (!nome) {
        alert("Digite o nome da matéria.");
        return;
    }

    materias.push({ nome, conteudos, tarefas });

    salvarDados();
    renderizarMaterias();

    document.getElementById("nomeMateria").value = "";
    document.getElementById("conteudos").value = "";
    document.getElementById("tarefas").value = "";
}

function excluirMateria(index) {
    materias.splice(index, 1);
    salvarDados();
    renderizarMaterias();
}

renderizarMaterias();
</script>

</body>
</html>
