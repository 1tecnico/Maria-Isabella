<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mochila Escolar Cloud Pública</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body{
    margin:0;
    font-family:Segoe UI, Arial;
    background:#f1fff6;
    color:#2a3a2b;
}
header{
    background:#b7e4c7;
    padding:15px;
    text-align:center;
    font-weight:bold;
}
nav{
    display:flex;
    gap:10px;
    justify-content:center;
    background:#d8f3dc;
    padding:10px;
}
.container{
    padding:20px;
    max-width:1100px;
    margin:auto;
}
.card{
    background:white;
    padding:15px;
    border-radius:12px;
    margin-bottom:10px;
    transition: all 0.3s;
}
.card:hover{
    transform: translateY(-2px);
}
.categoria{
    background:#95d5b2;
    padding:10px;
    border-radius:8px;
    cursor:pointer;
    margin-top:10px;
    font-weight:bold;
}
.categoria-conteudo{
    display:none;
    padding-left:10px;
}
.categoria-conteudo.ativo{
    display:block;
}
input, select, textarea{
    width:100%;
    padding:10px;
    margin:5px 0;
    border-radius:8px;
    border:1px solid #ccc;
}
button{
    padding:10px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    background:#95d5b2;
    margin-top:5px;
}
.lista-item{
    display:flex;
    justify-content:space-between;
    background:#e6f4ea;
    padding:5px 10px;
    margin-bottom:5px;
    border-radius:6px;
}
.concluida{
    text-decoration:line-through;
    opacity:0.6;
}
table{
    width:100%;
    border-collapse:collapse;
    margin-bottom:20px;
}
td, th{
    border:1px solid #ccc;
    padding:8px;
    text-align:center;
}
</style>
</head>

<body>

<header>🎒 Mochila Escolar Cloud Pública</header>

<nav>
    <button onclick="abrir('materias')">Matérias</button>
    <button onclick="abrir('horario')">Horário</button>
</nav>

<div class="container">

<!-- MATÉRIAS -->
<div id="materias">
    <div class="card">
        <input id="nomeMateria" placeholder="Nova matéria" onkeydown="if(event.key==='Enter') addMateria()">
        <select id="tipoMateria">
            <option>Exatas</option>
            <option>Humanas</option>
            <option>Informática</option>
        </select>
        <button onclick="addMateria()">Adicionar</button>
        <input id="pesquisa" placeholder="Pesquisar..." oninput="renderMaterias()">
    </div>
    <div id="listaMaterias"></div>
</div>

<!-- HORÁRIO -->
<div id="horario" class="hidden">
    <div class="card">
        <h3>Matutino (5 aulas)</h3>
        <table id="matutino"></table>

        <h3>Vespertino (4 aulas)</h3>
        <table id="vespertino"></table>

        <button onclick="salvarHorario()">Salvar Horário</button>
    </div>
</div>

</div>

<script>
// 🔥 CONFIG FIREBASE
const firebaseConfig = {
  apiKey: "COLE_AQUI",
  authDomain: "COLE_AQUI",
  projectId: "COLE_AQUI",
  storageBucket: "COLE_AQUI",
  messagingSenderId: "COLE_AQUI",
  appId: "COLE_AQUI"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let materias = [];
let horario = {};

// --------------------
// NAVEGAÇÃO
// --------------------
function abrir(p){
    document.getElementById("materias").style.display="none";
    document.getElementById("horario").style.display="none";
    document.getElementById(p).style.display="block";

    if(p==="horario"){
        gerarTabela("matutino",5);
        gerarTabela("vespertino",4);
        carregarHorario();
    }
}

// --------------------
// MATÉRIAS
// --------------------
function addMateria(){
    const nome = document.getElementById("nomeMateria").value.trim();
    const tipo = document.getElementById("tipoMateria").value;
    if(!nome) return alert("Digite o nome da matéria");
    materias.push({nome, tipo, conteudos:[], tarefas:[]});
    salvarMaterias();
    renderMaterias();
    document.getElementById("nomeMateria").value="";
}

function salvarMaterias(){
    db.collection("publico").doc("materias").set({lista:materias});
}

function carregarMaterias(){
    db.collection("publico").doc("materias").onSnapshot(doc=>{
        if(doc.exists){
            materias = doc.data().lista || [];
            renderMaterias();
        }
    });
}

function renderMaterias(){
    const lista = document.getElementById("listaMaterias");
    lista.innerHTML="";
    const pesquisa = document.getElementById("pesquisa").value.toLowerCase();

    ["Exatas","Humanas","Informática"].forEach(tipo=>{
        const grupo = materias.filter(m => m.tipo===tipo && m.nome.toLowerCase().includes(pesquisa));
        if(grupo.length===0) return;

        const cat = document.createElement("div");
        cat.className="categoria";
        cat.textContent=tipo;
        lista.appendChild(cat);

        const divConteudo = document.createElement("div");
        divConteudo.className="categoria-conteudo";

        grupo.forEach((m,i)=>{
            const card = document.createElement("div");
            card.className="card";

            card.innerHTML=`
            <h4>${m.nome}</h4>
            <h5>Conteúdos</h5>
            <div id="conteudos-${i}"></div>
            <input placeholder="Novo conteúdo" onkeydown="if(event.key==='Enter') addConteudo(${i},this.value)">
            <h5>Tarefas</h5>
            <div id="tarefas-${i}"></div>
            <input placeholder="Nova tarefa" onkeydown="if(event.key==='Enter') addTarefa(${i},this.value)">
            `;

            divConteudo.appendChild(card);

            // Render Conteúdos
            const conteudosDiv = card.querySelector("#conteudos-"+i);
            m.conteudos.forEach((c,ci)=>{
                const div = document.createElement("div");
                div.className="lista-item";
                div.innerHTML=`<span>${c}</span><button onclick="delConteudo(${i},${ci})">X</button>`;
                conteudosDiv.appendChild(div);
            });

            // Render Tarefas
            const tarefasDiv = card.querySelector("#tarefas-"+i);
            m.tarefas.forEach((t,ti)=>{
                const div = document.createElement("div");
                div.className="lista-item";
                div.innerHTML=`
                <div>
                <input type="checkbox" ${t.concluida?"checked":""} onchange="toggleTarefa(${i},${ti})">
                <span class="${t.concluida?"concluida":""}">${t.texto}</span>
                </div>
                <button onclick="delTarefa(${i},${ti})">X</button>
                `;
                tarefasDiv.appendChild(div);
            });

        });

        lista.appendChild(divConteudo);
        cat.onclick=()=> divConteudo.classList.toggle("ativo");
    });
}

// --------------------
// CONTEÚDOS E TAREFAS
// --------------------
function addConteudo(i,v){
    if(!v) return;
    materias[i].conteudos.push(v);
    salvarMaterias();
    renderMaterias();
}

function delConteudo(i,ci){
    materias[i].conteudos.splice(ci,1);
    salvarMaterias();
    renderMaterias();
}

function addTarefa(i,v){
    if(!v) return;
    materias[i].tarefas.push({texto:v,concluida:false});
    salvarMaterias();
    renderMaterias();
}

function delTarefa(i,ti){
    materias[i].tarefas.splice(ti,1);
    salvarMaterias();
    renderMaterias();
}

function toggleTarefa(i,ti){
    materias[i].tarefas[ti].concluida=!materias[i].tarefas[ti].concluida;
    salvarMaterias();
    renderMaterias();
}

// --------------------
// HORÁRIO
// --------------------
function gerarTabela(id,linhas){
    const dias=["Seg","Ter","Qua","Qui","Sex"];
    let html="<tr><th>Aula</th>";
    dias.forEach(d=>html+=`<th>${d}</th>`);
    html+="</tr>";
    for(let i=1;i<=linhas;i++){
        html+=`<tr><td>${i}</td>`;
        dias.forEach(d=>{
            html+=`<td contenteditable id="${id}-${i}-${d}"></td>`;
        });
        html+="</tr>";
    }
    document.getElementById(id).innerHTML=html;
}

function salvarHorario(){
    horario={};
    document.querySelectorAll("td[contenteditable]").forEach(td=>{
        horario[td.id]=td.innerText;
    });
    db.collection("publico").doc("horario").set(horario);
    alert("Horário salvo!");
}

function carregarHorario(){
    db.collection("publico").doc("horario").onSnapshot(doc=>{
        if(doc.exists){
            const dados = doc.data();
            for(let k in dados){
                const el = document.getElementById(k);
                if(el) el.innerText = dados[k];
            }
        }
    });
}

// --------------------
// INICIAL
// --------------------
carregarMaterias();
abrir('materias');

</script>

</body>
</html>
