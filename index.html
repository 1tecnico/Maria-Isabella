<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Mochila Escolar</title>

<style>
:root{
  --v1:#b8e6c6;
  --v2:#95d5b2;
  --v3:#e8f8ef;
  --fundo:#f3fbf6;
  --texto:#244b3a;
  --borda:#cfeedd;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:Segoe UI, Arial, sans-serif;
  background:var(--fundo);
  color:var(--texto);
}

header{
  background:var(--v1);
  padding:18px;
  text-align:center;
  font-size:24px;
  font-weight:bold;
  box-shadow:0 3px 8px rgba(0,0,0,0.1);
}

nav{
  display:flex;
  justify-content:center;
  gap:10px;
  background:var(--v3);
  padding:10px;
  flex-wrap:wrap;
}

nav button{
  background:var(--v2);
  border:none;
  padding:8px 14px;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}

.container{
  max-width:1000px;
  margin:auto;
  padding:20px;
}

.card{
  background:white;
  border-radius:14px;
  padding:16px;
  margin-bottom:16px;
  box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

input,select{
  width:100%;
  padding:8px;
  margin:5px 0 10px;
  border-radius:8px;
  border:1px solid var(--borda);
}

button{
  border:none;
  border-radius:8px;
  padding:6px 10px;
  cursor:pointer;
}

.btn{background:var(--v2)}

.lista-item{
  display:flex;
  justify-content:space-between;
  background:var(--v3);
  padding:6px;
  border-radius:8px;
  margin-bottom:5px;
}

.concluida{
  text-decoration:line-through;
  opacity:.6;
}

details{
  margin-bottom:10px;
}

summary{
  font-weight:bold;
  cursor:pointer;
  padding:6px;
}

.hidden{display:none}

.search{
  margin-bottom:15px;
}

footer{
  text-align:center;
  padding:12px;
  background:var(--v1);
}
</style>
</head>

<body>

<header>🎒 Mochila Escolar</header>

<nav>
<button onclick="aba('mochila')">🎒 Mochila</button>
<button onclick="aba('provas')">📅 Provas</button>
<button onclick="aba('info')">ℹ Informações</button>
</nav>

<div class="container">

<input class="search" id="pesquisa" placeholder="🔎 Pesquisar..." oninput="renderMaterias()">

<!-- MOCHILA -->
<div id="mochila">

<div class="card">
<h3>Adicionar Matéria</h3>

<input id="nomeMateria" placeholder="Nome da matéria">

<select id="categoriaMateria">
<option>Exatas</option>
<option>Humanas</option>
<option>Itinerários</option>
<option>Curso</option>
</select>

<button class="btn" onclick="addMateria()">Adicionar</button>
</div>

<div id="gavetas"></div>

</div>

<!-- PROVAS -->
<div id="provas" class="hidden">

<div class="card">
<h3>Adicionar Prova</h3>

<input id="provaMateria" placeholder="Matéria">
<input id="provaData" type="date">
<input id="provaConteudo" placeholder="Conteúdo">

<button class="btn" onclick="addProva()">Adicionar</button>

</div>

<div id="listaProvas"></div>

</div>

<!-- INFO -->
<div id="info" class="hidden">

<div class="card">

<h3>Informações Escolares</h3>

<input id="escola" placeholder="Escola">
<input id="turma" placeholder="Turma">
<input id="serie" placeholder="Série/Ano">
<input id="professor" placeholder="Professor">

<button class="btn" onclick="salvarInfo()">Salvar</button>

<div id="mostrarInfo"></div>

</div>

</div>

</div>

<footer>💾 Salvamento automático ativado</footer>

<script>

let materias = JSON.parse(localStorage.getItem("materias")) || [];
let provas = JSON.parse(localStorage.getItem("provas")) || [];
let info = JSON.parse(localStorage.getItem("info")) || {};

function salvar(){
localStorage.setItem("materias",JSON.stringify(materias));
localStorage.setItem("provas",JSON.stringify(provas));
localStorage.setItem("info",JSON.stringify(info));
}

function aba(id){

document.getElementById("mochila").classList.add("hidden");
document.getElementById("provas").classList.add("hidden");
document.getElementById("info").classList.add("hidden");

document.getElementById(id).classList.remove("hidden");

}

function addMateria(){

const nome=document.getElementById("nomeMateria").value.trim();
const categoria=document.getElementById("categoriaMateria").value;

if(!nome)return;

materias.push({nome,categoria,conteudos:[],tarefas:[]});

document.getElementById("nomeMateria").value="";

salvar();
renderMaterias();

}

function delMateria(i){

materias.splice(i,1);
salvar();
renderMaterias();

}

function addConteudo(i,v){

if(!v)return;
materias[i].conteudos.push(v);
salvar();
renderMaterias();

}

function delConteudo(i,ci){

materias[i].conteudos.splice(ci,1);
salvar();
renderMaterias();

}

function addTarefa(i,v){

if(!v)return;

materias[i].tarefas.push({texto:v,concluida:false});

salvar();
renderMaterias();

}

function delTarefa(i,ti){

materias[i].tarefas.splice(ti,1);
salvar();
renderMaterias();

}

function toggle(i,ti){

materias[i].tarefas[ti].concluida=!materias[i].tarefas[ti].concluida;

salvar();
renderMaterias();

}

function renderMaterias(){

const gavetas=document.getElementById("gavetas");
gavetas.innerHTML="";

const pesquisa=document.getElementById("pesquisa").value.toLowerCase();

const categorias=["Exatas","Humanas","Itinerários","Curso"];

categorias.forEach(cat=>{

const det=document.createElement("details");

const sum=document.createElement("summary");
sum.textContent=cat;

det.appendChild(sum);

materias.forEach((m,i)=>{

if(m.categoria!==cat)return;

const texto=(m.nome+m.conteudos.join()+m.tarefas.map(t=>t.texto)).toLowerCase();

if(!texto.includes(pesquisa))return;

const card=document.createElement("div");
card.className="card";

card.innerHTML=`
<h4>${m.nome}</h4>
<button onclick="delMateria(${i})">🗑</button>

<h5>📚 Conteúdos</h5>
<div id="conteudos${i}"></div>
<input placeholder="Adicionar conteúdo"
onkeydown="if(event.key==='Enter')addConteudo(${i},this.value)">

<h5>📝 Tarefas</h5>
<div id="tarefas${i}"></div>
<input placeholder="Adicionar tarefa"
onkeydown="if(event.key==='Enter')addTarefa(${i},this.value)">
`;

det.appendChild(card);

setTimeout(()=>{

const c=document.getElementById("conteudos"+i);
m.conteudos.forEach((co,ci)=>{

c.innerHTML+=`
<div class="lista-item">
<span>${co}</span>
<button onclick="delConteudo(${i},${ci})">❌</button>
</div>
`;

});

const t=document.getElementById("tarefas"+i);
m.tarefas.forEach((ta,ti)=>{

t.innerHTML+=`
<div class="lista-item">
<div>
<input type="checkbox" ${ta.concluida?"checked":""}
onchange="toggle(${i},${ti})">
<span class="${ta.concluida?"concluida":""}">${ta.texto}</span>
</div>
<button onclick="delTarefa(${i},${ti})">❌</button>
</div>
`;

});

},0);

});

gavetas.appendChild(det);

});

}

function addProva(){

const materia=document.getElementById("provaMateria").value;
const data=document.getElementById("provaData").value;
const conteudo=document.getElementById("provaConteudo").value;

provas.push({materia,data,conteudo});

salvar();
renderProvas();

}

function delProva(i){

provas.splice(i,1);
salvar();
renderProvas();

}

function renderProvas(){

const lista=document.getElementById("listaProvas");
lista.innerHTML="";

provas.forEach((p,i)=>{

lista.innerHTML+=`
<div class="card">
<h4>${p.materia}</h4>
<p>📅 ${p.data}</p>
<p>${p.conteudo}</p>
<button onclick="delProva(${i})">❌</button>
</div>
`;

});

}

function salvarInfo(){

info={
escola:document.getElementById("escola").value,
turma:document.getElementById("turma").value,
serie:document.getElementById("serie").value,
professor:document.getElementById("professor").value
};

salvar();
mostrarInfo();

}

function mostrarInfo(){

const d=document.getElementById("mostrarInfo");

d.innerHTML=`
<p><b>Escola:</b> ${info.escola||""}</p>
<p><b>Turma:</b> ${info.turma||""}</p>
<p><b>Série:</b> ${info.serie||""}</p>
<p><b>Professor:</b> ${info.professor||""}</p>
`;

}

renderMaterias();
renderProvas();
mostrarInfo();

</script>

</body>
</html>
