<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mochila Escolar Cloud</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body{
    margin:0;
    font-family:Segoe UI, Arial;
    background:#e6f4ea;
    color:#2a3a2b;
}
header{
    background:#b7e4c7;
    padding:15px;
    text-align:center;
    font-weight:bold;
}
nav{
    display:flex;
    gap:10px;
    justify-content:center;
    background:#d8f3dc;
    padding:10px;
}
.container{
    padding:20px;
    max-width:1200px;
    margin:auto;
}
.card{
    background:white;
    padding:15px;
    border-radius:12px;
    margin-bottom:10px;
    transition: all 0.3s;
}
.card:hover{
    transform: translateY(-2px);
}
.categoria{
    background:#95d5b2;
    padding:10px;
    border-radius:8px;
    cursor:pointer;
    margin-top:10px;
    font-weight:bold;
    display:flex;
    justify-content:space-between;
    align-items:center;
}
.categoria-conteudo{
    display:none;
    padding:10px 0;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
    gap: 10px;
}
input, select, textarea{
    width:100%;
    padding:10px;
    margin:5px 0;
    border-radius:8px;
    border:1px solid #ccc;
}
button{
    padding:10px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    background:#95d5b2;
    margin-top:5px;
}
.lista-item{
    display:flex;
    justify-content:space-between;
    background:#e6f4ea;
    padding:5px 10px;
    margin-bottom:5px;
    border-radius:6px;
}
.concluida{
    text-decoration:line-through;
    opacity:0.6;
}
.hidden{ display:none; }
table{
    width:100%;
    border-collapse:collapse;
    margin-bottom:20px;
}
td, th{
    border:1px solid #ccc;
    padding:8px;
    text-align:center;
}
</style>
</head>

<body>

<header>🎒 Mochila Escolar Cloud</header>

<nav>
    <button onclick="abrir('materias')">Matérias</button>
    <button onclick="abrir('horario')">Horário</button>
    <button onclick="abrir('provas')">Provas</button>
    <button onclick="abrir('info')">Informações</button>
</nav>

<div class="container">

<!-- MATÉRIAS -->
<div id="materias" class="hidden">
    <div class="card">
        <input id="nomeMateria" placeholder="Nova matéria" onkeydown="if(event.key==='Enter') addMateria()">
        <select id="tipoMateria">
            <option>Exatas</option>
            <option>Humanas</option>
            <option>Informática</option>
        </select>
        <button onclick="addMateria()">Adicionar</button>
        <input id="pesquisa" placeholder="Pesquisar..." oninput="renderMaterias()">
    </div>
    <div id="listaMaterias"></div>
</div>

<!-- HORÁRIO -->
<div id="horario" class="hidden">
    <div class="card">
        <h3>Matutino (5 aulas)</h3>
        <table id="matutino"></table>

        <h3>Vespertino (4 aulas)</h3>
        <table id="vespertino"></table>

        <button onclick="salvarHorario()">Salvar Horário</button>
    </div>
</div>

<!-- PROVAS -->
<div id="provas" class="hidden">
    <div class="card">
        <input id="materiaProva" placeholder="Matéria" onkeydown="if(event.key==='Enter') addProva()">
        <input id="dataProva" type="date">
        <input id="conteudoProva" placeholder="Conteúdo da prova" onkeydown="if(event.key==='Enter') addProva()">
        <button onclick="addProva()">Adicionar Prova</button>
    </div>
    <div id="listaProvas"></div>
</div>

<!-- INFORMAÇÕES ESCOLARES -->
<div id="info" class="hidden">
    <div class="card">
        <input id="escola" placeholder="Escola">
        <input id="turma" placeholder="Turma">
        <input id="turno" placeholder="Turno">
        <input id="aluno" placeholder="Nome do aluno">
        <button onclick="salvarInfo()">Salvar Informações</button>
        <div id="mostrarInfo"></div>
    </div>
</div>

</div>

<script>
// 🔥 FIREBASE
const firebaseConfig = {
  apiKey: "COLE_AQUI",
  authDomain: "COLE_AQUI",
  projectId: "COLE_AQUI",
  storageBucket: "COLE_AQUI",
  messagingSenderId: "COLE_AQUI",
  appId: "COLE_AQUI"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let materias = [], provas = [], info = {}, horario = {};

// --------------------
// ABAS
function abrir(p){
    document.getElementById("materias").classList.add("hidden");
    document.getElementById("horario").classList.add("hidden");
    document.getElementById("provas").classList.add("hidden");
    document.getElementById("info").classList.add("hidden");
    document.getElementById(p).classList.remove("hidden");

    if(p==="horario"){
        gerarTabela("matutino",5);
        gerarTabela("vespertino",4);
        carregarHorario();
    }
}

// --------------------
// MATÉRIAS
function addMateria(){
    const nome=document.getElementById("nomeMateria").value.trim();
    const tipo=document.getElementById("tipoMateria").value;
    if(!nome) return alert("Digite o nome da matéria");
    materias.push({nome,tipo,conteudos:[],tarefas:[]});
    salvarMaterias();
    renderMaterias();
    document.getElementById("nomeMateria").value="";
}
function salvarMaterias(){ db.collection("publico").doc("materias").set({lista:materias}); }
function carregarMaterias(){ db.collection("publico").doc("materias").onSnapshot(doc=>{ if(doc.exists){ materias=doc.data().lista||[]; renderMaterias(); } }); }

function renderMaterias(){
    const lista=document.getElementById("listaMaterias");
    lista.innerHTML="";
    const pesquisa=document.getElementById("pesquisa").value.toLowerCase();

    ["Exatas","Humanas","Informática"].forEach(tipo=>{
        const grupo = materias.filter(m=>m.tipo===tipo && m.nome.toLowerCase().includes(pesquisa));
        if(grupo.length===0) return;

        const cat=document.createElement("div");
        cat.className="categoria";

        const spanTipo=document.createElement("span");
        spanTipo.textContent=tipo;
        const btnToggle=document.createElement("button");
        btnToggle.textContent="Abrir/Fechar";
        btnToggle.style.background="#74c69d";

        const divConteudo=document.createElement("div");
        divConteudo.className="categoria-conteudo";

        btnToggle.onclick=()=> divConteudo.classList.toggle("ativo");

        cat.appendChild(spanTipo);
        cat.appendChild(btnToggle);
        lista.appendChild(cat);
        lista.appendChild(divConteudo);

        grupo.forEach((m,i)=>{
            const card=document.createElement("div");
            card.className="card";
            card.innerHTML=`
                <h4>${m.nome}</h4>
                <h5>Conteúdos</h5>
                <div id="conteudos-${i}"></div>
                <input placeholder="Novo conteúdo" onkeydown="if(event.key==='Enter') addConteudo(${i},this.value)">
                <h5>Tarefas</h5>
                <div id="tarefas-${i}"></div>
                <input placeholder="Nova tarefa" onkeydown="if(event.key==='Enter') addTarefa(${i},this.value)">
            `;
            divConteudo.appendChild(card);

            // Conteúdos
            const conteudosDiv=card.querySelector("#conteudos-"+i);
            m.conteudos.forEach((c,ci)=>{ const d=document.createElement("div"); d.className="lista-item"; d.innerHTML=`<span>${c}</span><button onclick="delConteudo(${i},${ci})">X</button>`; conteudosDiv.appendChild(d); });

            // Tarefas
            const tarefasDiv=card.querySelector("#tarefas-"+i);
            m.tarefas.forEach((t,ti)=>{ const d=document.createElement("div"); d.className="lista-item"; d.innerHTML=`<div><input type="checkbox" ${t.concluida?"checked":""} onchange="toggleTarefa(${i},${ti})"><span class="${t.concluida?"concluida":""}">${t.texto}</span></div><button onclick="delTarefa(${i},${ti})">X</button>`; tarefasDiv.appendChild(d); });
        });
    });
}

// --------------------
// Conteúdos / Tarefas
function addConteudo(i,v){ if(!v) return; materias[i].conteudos.push(v); salvarMaterias(); renderMaterias(); }
function delConteudo(i,ci){ materias[i].conteudos.splice(ci,1); salvarMaterias(); renderMaterias(); }
function addTarefa(i,v){ if(!v) return; materias[i].tarefas.push({texto:v,concluida:false}); salvarMaterias(); renderMaterias(); }
function delTarefa(i,ti){ materias[i].tarefas.splice(ti,1); salvarMaterias(); renderMaterias(); }
function toggleTarefa(i,ti){ materias[i].tarefas[ti].concluida=!materias[i].tarefas[ti].concluida; salvarMaterias(); renderMaterias(); }

// --------------------
// HORÁRIO
function gerarTabela(id,linhas){
    const dias=["Seg","Ter","Qua","Qui","Sex"];
    let html="<tr><th>Aula</th>"; dias.forEach(d=>html+=`<th>${d}</th>`); html+="</tr>";
    for(let i=1;i<=linhas;i++){ html+=`<tr><td>${i}</td>`; dias.forEach(d=> html+=`<td contenteditable id="${id}-${i}-${d}"></td>`); html+="</tr>"; }
    document.getElementById(id).innerHTML=html;
}
function salvarHorario(){ horario={}; document.querySelectorAll("td[contenteditable]").forEach(td=> horario[td.id]=td.innerText); db.collection("publico").doc("horario").set(horario); alert("Horário salvo!"); }
function carregarHorario(){ db.collection("publico").doc("horario").onSnapshot(doc=>{ if(doc.exists){ const dados=doc.data(); for(let k in dados){ const el=document.getElementById(k); if(el) el.innerText=dados[k]; } } }); }

// --------------------
// PROVAS
function addProva(){ const m=document.getElementById("materiaProva").value.trim(); const d=document.getElementById("dataProva").value; const c=document.getElementById("conteudoProva").value.trim(); if(!m||!d||!c)return alert("Preencha todos os campos"); provas.push({materia:m,data:d,conteudo:c}); salvarProvas(); renderProvas(); document.getElementById("materiaProva").value=""; document.getElementById("dataProva").value=""; document.getElementById("conteudoProva").value=""; }
function salvarProvas(){ db.collection("publico").doc("provas").set({lista:provas}); }
function carregarProvas(){ db.collection("publico").doc("provas").onSnapshot(doc=>{ if(doc.exists){ provas=doc.data().lista||[]; renderProvas(); } }); }
function renderProvas(){ const div=document.getElementById("listaProvas"); div.innerHTML=""; provas.forEach((p,i)=>{ const card=document.createElement("div"); card.className="card"; card.innerHTML=`<h4>${p.materia}</h4><p><b>Data:</b>${p.data}</p><p><b>Conteúdo:</b>${p.conteudo}</p><button onclick="delProva(${i})">Excluir</button>`; div.appendChild(card); }); }
function delProva(i){ provas.splice(i,1); salvarProvas(); renderProvas(); }

// --------------------
// INFORMAÇÕES ESCOLARES
function salvarInfo(){ info={ escola:document.getElementById("escola").value, turma:document.getElementById("turma").value, turno:document.getElementById("turno").value, aluno:document.getElementById("aluno").value }; db.collection("publico").doc("info").set(info); mostrarInfo(); }
function carregarInfo(){ db.collection("publico").doc("info").onSnapshot(doc=>{ if(doc.exists){ info=doc.data(); mostrarInfo(); } }); }
function mostrarInfo(){ const div=document.getElementById("mostrarInfo"); div.innerHTML=`<p><b>Escola:</b>${info.escola||""}</p><p><b>Turma:</b>${info.turma||""}</p><p><b>Turno:</b>${info.turno||""}</p><p><b>Aluno:</b>${info.aluno||""}</p>`; }

// --------------------
// INICIAL
carregarMaterias();
carregarHorario();
carregarProvas();
carregarInfo();
abrir("materias");

</script>
</body>
</html>
