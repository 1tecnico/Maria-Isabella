<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mochila Escolar Digital</title>

<style>

body{
font-family:Arial, sans-serif;
margin:0;
background:#eef7f1;
}

header{
background:#8fd3a8;
color:#1f3d2b;
text-align:center;
padding:20px;
}

.container{
max-width:1000px;
margin:auto;
padding:20px;
}

input, select{
padding:8px;
border-radius:6px;
border:1px solid #cfe7d6;
margin:5px 0;
}

button{
padding:8px 12px;
border:none;
border-radius:6px;
cursor:pointer;
margin-left:5px;
}

.add{
background:#7bcfa0;
color:white;
}

.delete{
background:#e57373;
color:white;
}

.materia{
background:white;
padding:15px;
border-radius:10px;
margin-top:15px;
box-shadow:0 2px 6px rgba(0,0,0,0.08);
}

.categoria{
margin-top:30px;
}

.categoria h2{
color:#2e6f4f;
border-bottom:2px solid #b8e0c7;
padding-bottom:5px;
}

.tarefa{
display:flex;
justify-content:space-between;
margin-top:5px;
}

.concluida{
text-decoration:line-through;
color:gray;
}

.search{
width:100%;
margin-bottom:15px;
}

</style>
</head>

<body>

<header>
<h1>🎒 Mochila Escolar Digital</h1>
</header>

<div class="container">

<input id="pesquisa" class="search" placeholder="Pesquisar matéria ou tarefa...">

<br>

<input id="materiaInput" placeholder="Nome da matéria">

<select id="categoriaSelect">
<option value="Exatas">Exatas</option>
<option value="Humanas">Humanas</option>
<option value="Itinerarios">Itinerários</option>
<option value="Curso">Matérias do Curso</option>
</select>

<button class="add" onclick="addMateria()">Adicionar</button>

<div id="categorias"></div>

</div>

<script>

let materias = JSON.parse(localStorage.getItem("materias")) || [];

const categorias = ["Exatas","Humanas","Itinerarios","Curso"];

function salvar(){
localStorage.setItem("materias", JSON.stringify(materias));
}

function render(){

const pesquisa = document.getElementById("pesquisa").value.toLowerCase();
const container = document.getElementById("categorias");
container.innerHTML="";

categorias.forEach(cat => {

let divCat = document.createElement("div");
divCat.className="categoria";

let conteudo="";

materias
.filter(m=>m.categoria===cat)
.forEach((m,i)=>{

let tarefasHTML="";

m.tarefas.forEach((t,j)=>{

if(
m.nome.toLowerCase().includes(pesquisa) ||
t.nome.toLowerCase().includes(pesquisa)
){

tarefasHTML+=`
<div class="tarefa">
<span class="${t.concluida?'concluida':''}">${t.nome}</span>

<div>
<button onclick="concluir(${i},${j})">✔</button>
<button class="delete" onclick="excluirTarefa(${i},${j})">X</button>
</div>
</div>
`;

}

});

if(pesquisa && tarefasHTML=="" && !m.nome.toLowerCase().includes(pesquisa)) return;

conteudo+=`

<div class="materia">

<h3>${m.nome}</h3>

<input id="tarefa${i}" placeholder="Nova tarefa">
<button class="add" onclick="addTarefa(${i})">Adicionar</button>
<button class="delete" onclick="excluirMateria(${i})">Excluir</button>

${tarefasHTML}

</div>

`;

});

divCat.innerHTML=`<h2>${cat}</h2>${conteudo}`;

container.appendChild(divCat);

});

salvar();
}

function addMateria(){

const input=document.getElementById("materiaInput");
const cat=document.getElementById("categoriaSelect");

const nome=input.value.trim();
if(nome==="") return;

materias.push({
nome:nome,
categoria:cat.value,
tarefas:[]
});

input.value="";

render();
}

function excluirMateria(i){
materias.splice(i,1);
render();
}

function addTarefa(i){

const input=document.getElementById("tarefa"+i);
const nome=input.value.trim();

if(nome==="") return;

materias[i].tarefas.push({
nome:nome,
concluida:false
});

input.value="";

render();
}

function excluirTarefa(i,j){
materias[i].tarefas.splice(j,1);
render();
}

function concluir(i,j){
materias[i].tarefas[j].concluida=!materias[i].tarefas[j].concluida;
render();
}

document.getElementById("pesquisa").addEventListener("input", render);

document.getElementById("materiaInput").addEventListener("keypress", function(e){
if(e.key==="Enter"){
e.preventDefault();
addMateria();
}
});

document.addEventListener("keypress", function(e){

if(e.key==="Enter" && e.target.id.startsWith("tarefa")){
e.preventDefault();
let index = e.target.id.replace("tarefa","");
addTarefa(index);
}

});

render();

</script>

</body>
</html>
