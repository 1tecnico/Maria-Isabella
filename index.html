<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mochila Escolar Digital</title>

<style>
:root{
    --rosa-principal:#ffb6c1;
    --rosa-secundario:#ff9eb5;
    --rosa-claro:#fff0f5;
    --fundo:#ffe6f0;
    --texto:#5a2a3a;
}

body{
    margin:0;
    font-family: 'Segoe UI', Arial, sans-serif;
    background:var(--fundo);
}

header{
    background:var(--rosa-principal);
    color:var(--texto);
    padding:20px;
    text-align:center;
    font-size:22px;
    font-weight:bold;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.container{
    max-width:800px;
    margin:auto;
    padding:20px;
}

.card{
    background:white;
    border-radius:16px;
    padding:20px;
    margin-bottom:20px;
    box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

input{
    width:100%;
    padding:10px;
    margin-bottom:10px;
    border-radius:8px;
    border:1px solid var(--rosa-principal);
}

button{
    padding:8px 12px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:600;
}

.btn-add{
    background:var(--rosa-secundario);
    color:var(--texto);
    width:100%;
}

.btn-add:hover{
    background:#ff85a2;
}

.materia{
    border-left:6px solid var(--rosa-secundario);
}

.materia h3{
    margin-top:0;
    color:#c71585;
}

.lista-item{
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:var(--rosa-claro);
    padding:8px 10px;
    border-radius:8px;
    margin-bottom:6px;
}

.concluida{
    text-decoration: line-through;
    opacity:0.6;
}

.acoes button{
    margin-left:5px;
    background:#ff4d6d;
    color:white;
}

.acoes button:hover{
    background:#e63950;
}

.excluir-materia{
    background:#ff4d6d;
    color:white;
    float:right;
}

footer{
    text-align:center;
    padding:15px;
    background:var(--rosa-principal);
    margin-top:30px;
    color:var(--texto);
}
</style>
</head>

<body>

<header>🎒 Minha Mochila Escolar</header>

<div class="container">

<div class="card">
    <h2>Adicionar Matéria</h2>
    <input type="text" id="nomeMateria" placeholder="Nome da matéria">
    <button class="btn-add" onclick="adicionarMateria()">Adicionar Matéria</button>
</div>

<div id="listaMaterias"></div>

</div>

<footer>© 2026 Mochila Escolar Digital</footer>

<script>
let materias = JSON.parse(localStorage.getItem("materias")) || [];

function salvar(){
    localStorage.setItem("materias", JSON.stringify(materias));
}

function renderizar(){
    const lista = document.getElementById("listaMaterias");
    lista.innerHTML = "";

    materias.forEach((materia, i) => {

        const card = document.createElement("div");
        card.className = "card materia";

        const titulo = document.createElement("h3");
        titulo.textContent = materia.nome;

        const btnExcluirMateria = document.createElement("button");
        btnExcluirMateria.textContent = "Excluir Matéria";
        btnExcluirMateria.className = "excluir-materia";
        btnExcluirMateria.onclick = () => {
            materias.splice(i,1);
            salvar();
            renderizar();
        };

        card.appendChild(btnExcluirMateria);
        card.appendChild(titulo);

        // -------- CONTEÚDOS --------
        const tituloConteudo = document.createElement("strong");
        tituloConteudo.textContent = "Conteúdos";
        card.appendChild(tituloConteudo);

        materia.conteudos.forEach((conteudo, index) => {
            const item = document.createElement("div");
            item.className = "lista-item";

            const span = document.createElement("span");
            span.textContent = conteudo;

            const btn = document.createElement("button");
            btn.textContent = "X";
            btn.onclick = () => {
                materia.conteudos.splice(index,1);
                salvar();
                renderizar();
            };

            const acoes = document.createElement("div");
            acoes.className = "acoes";
            acoes.appendChild(btn);

            item.appendChild(span);
            item.appendChild(acoes);
            card.appendChild(item);
        });

        const inputConteudo = document.createElement("input");
        inputConteudo.placeholder = "Novo conteúdo (Enter)";
        inputConteudo.onkeydown = (e) => {
            if(e.key === "Enter" && inputConteudo.value.trim()){
                materia.conteudos.push(inputConteudo.value.trim());
                salvar();
                renderizar();
            }
        };
        card.appendChild(inputConteudo);

        // -------- TAREFAS --------
        const tituloTarefa = document.createElement("strong");
        tituloTarefa.textContent = "Tarefas";
        card.appendChild(tituloTarefa);

        materia.tarefas.forEach((tarefa, index) => {
            const item = document.createElement("div");
            item.className = "lista-item";

            const left = document.createElement("div");

            const check = document.createElement("input");
            check.type = "checkbox";
            check.checked = tarefa.concluida;
            check.onchange = () => {
                tarefa.concluida = !tarefa.concluida;
                salvar();
                renderizar();
            };

            const span = document.createElement("span");
            span.textContent = tarefa.texto;
            if(tarefa.concluida) span.classList.add("concluida");

            left.appendChild(check);
            left.appendChild(span);

            const btn = document.createElement("button");
            btn.textContent = "X";
            btn.onclick = () => {
                materia.tarefas.splice(index,1);
                salvar();
                renderizar();
            };

            const acoes = document.createElement("div");
            acoes.className = "acoes";
            acoes.appendChild(btn);

            item.appendChild(left);
            item.appendChild(acoes);
            card.appendChild(item);
        });

        const inputTarefa = document.createElement("input");
        inputTarefa.placeholder = "Nova tarefa (Enter)";
        inputTarefa.onkeydown = (e) => {
            if(e.key === "Enter" && inputTarefa.value.trim()){
                materia.tarefas.push({
                    texto: inputTarefa.value.trim(),
                    concluida:false
                });
                salvar();
                renderizar();
            }
        };
        card.appendChild(inputTarefa);

        lista.appendChild(card);
    });
}

function adicionarMateria(){
    const nome = document.getElementById("nomeMateria").value.trim();
    if(!nome) return alert("Digite o nome da matéria.");

    materias.push({
        nome:nome,
        conteudos:[],
        tarefas:[]
    });

    salvar();
    renderizar();
    document.getElementById("nomeMateria").value="";
}

renderizar();
</script>

</body>
</html>
