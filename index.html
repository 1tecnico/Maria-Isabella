<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Mochila Escolar</title>

<style>

body{
font-family: Arial;
margin:0;
background:#e8f5e9;
}

header{
background:#a5d6a7;
padding:20px;
text-align:center;
}

nav{
display:flex;
justify-content:center;
gap:10px;
background:#c8e6c9;
padding:10px;
}

nav button{
padding:10px 15px;
border:none;
background:#81c784;
border-radius:6px;
cursor:pointer;
}

nav button:hover{
background:#66bb6a;
}

.aba{
display:none;
padding:20px;
}

.ativa{
display:block;
}

input,select{
padding:8px;
margin:5px;
}

.materia{
background:white;
padding:12px;
margin-top:10px;
border-radius:6px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.concluida{
text-decoration:line-through;
color:gray;
}

</style>
</head>

<body>

<header>
<h1>🎒 Mochila Escolar Digital</h1>
</header>

<nav>
<button onclick="abrirAba('mochila')">🎒 Mochila</button>
<button onclick="abrirAba('provas')">📅 Calendário de Provas</button>
<button onclick="abrirAba('info')">ℹ Informações Escolares</button>
</nav>

<!-- MOCHILA -->

<div id="mochila" class="aba ativa">

<h2>Matérias</h2>

<input id="pesquisa" placeholder="Pesquisar matéria">

<br>

<input id="materiaNome" placeholder="Nome da matéria">

<select id="categoria">
<option>Exatas</option>
<option>Humanas</option>
<option>Itinerários</option>
<option>Curso</option>
</select>

<button onclick="addMateria()">Adicionar</button>

<div id="listaMaterias"></div>

</div>

<!-- PROVAS -->

<div id="provas" class="aba">

<h2>Calendário de Provas</h2>

<input id="provaNome" placeholder="Nome da prova">
<input type="date" id="provaData">

<button onclick="addProva()">Adicionar</button>

<ul id="listaProvas"></ul>

</div>

<!-- INFORMAÇÕES -->

<div id="info" class="aba">

<h2>Informações Escolares</h2>

<textarea id="infoTexto" rows="8" style="width:100%" placeholder="Anotações da escola..."></textarea>

<br><br>

<button onclick="salvarInfo()">Salvar</button>

</div>

<script>

let materias = JSON.parse(localStorage.getItem("materias")) || []
let provas = JSON.parse(localStorage.getItem("provas")) || []

function abrirAba(nome){

document.querySelectorAll(".aba").forEach(a=>{
a.classList.remove("ativa")
})

document.getElementById(nome).classList.add("ativa")

}

function salvar(){

localStorage.setItem("materias",JSON.stringify(materias))

}

function addMateria(){

let nome=document.getElementById("materiaNome").value
let cat=document.getElementById("categoria").value

if(nome=="") return

materias.push({
nome:nome,
categoria:cat,
tarefas:[],
conteudos:[]
})

document.getElementById("materiaNome").value=""

salvar()

render()

}

function excluirMateria(i){

materias.splice(i,1)

salvar()

render()

}

function addTarefa(i){

let t=prompt("Nova tarefa")

if(!t) return

materias[i].tarefas.push({texto:t,done:false})

salvar()

render()

}

function concluirTarefa(mi,ti){

materias[mi].tarefas[ti].done=!materias[mi].tarefas[ti].done

salvar()

render()

}

function excluirTarefa(mi,ti){

materias[mi].tarefas.splice(ti,1)

salvar()

render()

}

function addConteudo(i){

let c=prompt("Conteúdo estudado")

if(!c) return

materias[i].conteudos.push(c)

salvar()

render()

}

function excluirConteudo(mi,ci){

materias[mi].conteudos.splice(ci,1)

salvar()

render()

}

function render(){

let lista=document.getElementById("listaMaterias")

lista.innerHTML=""

let pesquisa=document.getElementById("pesquisa").value.toLowerCase()

materias.forEach((m,i)=>{

if(!m.nome.toLowerCase().includes(pesquisa)) return

let div=document.createElement("div")

div.className="materia"

div.innerHTML=`

<h3>${m.nome} (${m.categoria})</h3>

<button onclick="excluirMateria(${i})">Excluir Matéria</button>

<h4>Tarefas</h4>

<ul>

${m.tarefas.map((t,ti)=>`
<li class="${t.done?'concluida':''}">
${t.texto}
<button onclick="concluirTarefa(${i},${ti})">✔</button>
<button onclick="excluirTarefa(${i},${ti})">❌</button>
</li>
`).join("")}

</ul>

<button onclick="addTarefa(${i})">Adicionar tarefa</button>

<h4>Conteúdos</h4>

<ul>

${m.conteudos.map((c,ci)=>`
<li>
${c}
<button onclick="excluirConteudo(${i},${ci})">❌</button>
</li>
`).join("")}

</ul>

<button onclick="addConteudo(${i})">Adicionar conteúdo</button>

`

lista.appendChild(div)

})

}

function addProva(){

let nome=document.getElementById("provaNome").value
let data=document.getElementById("provaData").value

if(!nome || !data) return

provas.push({nome,data})

localStorage.setItem("provas",JSON.stringify(provas))

renderProvas()

}

function renderProvas(){

let lista=document.getElementById("listaProvas")

lista.innerHTML=""

provas.forEach(p=>{

let li=document.createElement("li")

li.innerText=p.nome+" - "+p.data

lista.appendChild(li)

})

}

function salvarInfo(){

let texto=document.getElementById("infoTexto").value

localStorage.setItem("info",texto)

}

document.getElementById("infoTexto").value=localStorage.getItem("info")||""

document.getElementById("pesquisa").addEventListener("input",render)

document.getElementById("materiaNome").addEventListener("keypress",e=>{
if(e.key==="Enter") addMateria()
})

render()
renderProvas()

</script>

</body>
</html>
