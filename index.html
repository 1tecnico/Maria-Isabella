<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mochila Escolar Digital</title>

<style>

body{
font-family:Arial;
margin:0;
background:#eef7f1;
}

header{
background:#8fd3a8;
padding:20px;
text-align:center;
color:#1f3d2b;
}

nav{
display:flex;
justify-content:center;
background:#b8e0c7;
gap:10px;
padding:10px;
flex-wrap:wrap;
}

nav button{
background:#7bcfa0;
border:none;
padding:10px 15px;
border-radius:8px;
cursor:pointer;
}

.container{
max-width:1000px;
margin:auto;
padding:20px;
}

input,select{
padding:8px;
border-radius:6px;
border:1px solid #cfe7d6;
margin:5px 0;
}

button{
padding:8px 12px;
border:none;
border-radius:6px;
cursor:pointer;
margin:3px;
}

.add{background:#7bcfa0;color:white;}
.delete{background:#e57373;color:white;}

.card{
background:white;
padding:15px;
border-radius:10px;
margin-top:15px;
box-shadow:0 2px 6px rgba(0,0,0,0.08);
}

.tarefa{
display:flex;
justify-content:space-between;
margin-top:5px;
}

.concluida{
text-decoration:line-through;
color:gray;
}

.hidden{display:none;}

.categoria{
margin-top:30px;
}

.categoria h3{
color:#2e6f4f;
border-bottom:2px solid #b8e0c7;
}

</style>
</head>

<body>

<header>
<h1>🎒 Mochila Escolar Digital</h1>
</header>

<nav>
<button onclick="mostrar('mochila')">Mochila</button>
<button onclick="mostrar('conteudos')">Conteúdos</button>
<button onclick="mostrar('provas')">Calendário de Provas</button>
<button onclick="mostrar('info')">Informações</button>
</nav>

<div class="container">

<input id="pesquisa" placeholder="Pesquisar...">

<!-- MOCHILA -->
<div id="mochila">

<input id="materiaInput" placeholder="Nome da matéria">

<select id="categoriaSelect">
<option value="Exatas">Exatas</option>
<option value="Humanas">Humanas</option>
<option value="Itinerarios">Itinerários</option>
<option value="Curso">Curso</option>
</select>

<button class="add" onclick="addMateria()">Adicionar</button>

<div id="listaMaterias"></div>

</div>

<!-- CONTEUDOS -->
<div id="conteudos" class="hidden">

<h2>Conteúdos</h2>

<input id="conteudoInput" placeholder="Novo conteúdo">
<button class="add" onclick="addConteudo()">Adicionar</button>

<div id="listaConteudos"></div>

</div>

<!-- PROVAS -->
<div id="provas" class="hidden">

<h2>Calendário de Provas</h2>

<input id="provaNome" placeholder="Nome da prova">
<input type="date" id="provaData">

<button class="add" onclick="addProva()">Adicionar</button>

<div id="listaProvas"></div>

</div>

<!-- INFO -->
<div id="info" class="hidden">

<h2>Informações Escolares</h2>

<textarea id="infoTexto" style="width:100%;height:120px"></textarea>
<br>
<button class="add" onclick="salvarInfo()">Salvar</button>

</div>

</div>

<script>

let materias=JSON.parse(localStorage.getItem("materias"))||[];
let conteudos=JSON.parse(localStorage.getItem("conteudos"))||[];
let provas=JSON.parse(localStorage.getItem("provas"))||[];
let info=localStorage.getItem("info")||"";

const categorias=["Exatas","Humanas","Itinerarios","Curso"];

function salvar(){

localStorage.setItem("materias",JSON.stringify(materias));
localStorage.setItem("conteudos",JSON.stringify(conteudos));
localStorage.setItem("provas",JSON.stringify(provas));
localStorage.setItem("info",info);

}

function mostrar(sec){

["mochila","conteudos","provas","info"].forEach(id=>{
document.getElementById(id).classList.add("hidden");
});

document.getElementById(sec).classList.remove("hidden");

}

function render(){

renderMaterias();
renderConteudos();
renderProvas();
document.getElementById("infoTexto").value=info;

salvar();

}

function renderMaterias(){

let container=document.getElementById("listaMaterias");
container.innerHTML="";

categorias.forEach(cat=>{

let bloco=document.createElement("div");
bloco.className="categoria";

let html="";

materias.forEach((m,i)=>{

if(m.categoria!==cat)return;

let tarefas="";

m.tarefas.forEach((t,j)=>{

tarefas+=`
<div class="tarefa">
<span class="${t.concluida?'concluida':''}">${t.nome}</span>
<div>
<button onclick="concluir(${i},${j})">✔</button>
<button class="delete" onclick="excluirTarefa(${i},${j})">X</button>
</div>
</div>
`;

});

html+=`

<div class="card">

<b>${m.nome}</b>

<br>

<input id="tarefa${i}" placeholder="Nova tarefa">
<button class="add" onclick="addTarefa(${i})">Adicionar</button>
<button class="delete" onclick="excluirMateria(${i})">Excluir matéria</button>

${tarefas}

</div>

`;

});

bloco.innerHTML=`<h3>${cat}</h3>${html}`;

container.appendChild(bloco);

});

}

function addMateria(){

let nome=document.getElementById("materiaInput").value.trim();
let cat=document.getElementById("categoriaSelect").value;

if(nome==="")return;

materias.push({nome:nome,categoria:cat,tarefas:[]});

document.getElementById("materiaInput").value="";

render();

}

function excluirMateria(i){

materias.splice(i,1);
render();

}

function addTarefa(i){

let input=document.getElementById("tarefa"+i);
let nome=input.value.trim();

if(nome==="")return;

materias[i].tarefas.push({nome:nome,concluida:false});

input.value="";

render();

}

function concluir(i,j){

materias[i].tarefas[j].concluida=!materias[i].tarefas[j].concluida;
render();

}

function excluirTarefa(i,j){

materias[i].tarefas.splice(j,1);
render();

}

function addConteudo(){

let nome=document.getElementById("conteudoInput").value.trim();
if(nome==="")return;

conteudos.push(nome);

document.getElementById("conteudoInput").value="";

render();

}

function renderConteudos(){

let div=document.getElementById("listaConteudos");
div.innerHTML="";

conteudos.forEach((c,i)=>{

div.innerHTML+=`
<div class="card">
${c}
<button class="delete" onclick="excluirConteudo(${i})">Excluir</button>
</div>
`;

});

}

function excluirConteudo(i){

conteudos.splice(i,1);
render();

}

function addProva(){

let nome=document.getElementById("provaNome").value.trim();
let data=document.getElementById("provaData").value;

if(nome==="")return;

provas.push({nome:nome,data:data});

document.getElementById("provaNome").value="";
render();

}

function renderProvas(){

let div=document.getElementById("listaProvas");
div.innerHTML="";

provas.forEach((p,i)=>{

div.innerHTML+=`
<div class="card">
${p.nome} - ${p.data}
<button class="delete" onclick="excluirProva(${i})">Excluir</button>
</div>
`;

});

}

function excluirProva(i){

provas.splice(i,1);
render();

}

function salvarInfo(){

info=document.getElementById("infoTexto").value;
render();

}

render();

</script>

</body>
</html>
